services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cyclope
      POSTGRES_PASSWORD: cyclope
      POSTGRES_DB: cyclope
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyclope -d cyclope"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    environment:
      CYCLOPE_DATABASE_URL: postgresql+psycopg://cyclope:cyclope@postgres:5432/cyclope
      CYCLOPE_LOG_LEVEL: INFO
      CYCLOPE_JWT_SECRET_KEY: change-me-in-production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
